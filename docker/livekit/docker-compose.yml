# PsyScale — LiveKit Video Server (OVH HDS)
# Reverse proxy via nginx (existant sur le VPS)
# Redis partagé avec l'API — NE PAS démarrer un 2ème Redis

services:
  livekit:
    image: livekit/livekit-server:v1.8
    container_name: livekit
    restart: unless-stopped
    network_mode: host
    environment:
      - LIVEKIT_CONFIG=/etc/livekit.yaml
    volumes:
      - ./livekit.yaml:/etc/livekit.yaml:ro
