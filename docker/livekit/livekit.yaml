# PsyScale — LiveKit Server Configuration (OVH HDS)
# Ports : 7880 (HTTP API), 7881 (RTC UDP), 50000-50200 (media), 7882 (TURN TLS)

port: 7880
bind_addresses:
  - ""
rtc:
  udp_port: 7881
  port_range_start: 50000
  port_range_end: 50200
  use_external_ip: true
  # Le VPS a une seule IP publique — LiveKit la détecte automatiquement
redis:
  address: localhost:6380
keys:
  # IMPORTANT: Remplacer par les vraies clés avant déploiement
  # Générer avec: docker run --rm livekit/generate
  REPLACE_API_KEY: REPLACE_API_SECRET
turn:
  enabled: true
  domain: video.psylib.eu
  tls_port: 7882
room:
  empty_timeout: 300  # 5 minutes — nettoyage rooms vides
logging:
  level: info
