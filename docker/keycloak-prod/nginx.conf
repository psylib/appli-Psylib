events {
    worker_connections 1024;
}

http {
    # Logging HDS — accès + erreurs
    access_log  /var/log/nginx/keycloak-access.log;
    error_log   /var/log/nginx/keycloak-error.log;

    # Gzip
    gzip on;
    gzip_types text/plain application/json application/javascript text/css;

    # Upstream Keycloak
    upstream keycloak {
        server 127.0.0.1:8080;
        keepalive 32;
    }

    # Redirect HTTP -> HTTPS
    server {
        listen 80;
        server_name auth.psylib.eu;
        return 301 https://$host$request_uri;
    }

    # HTTPS
    server {
        listen 443 ssl http2;
        server_name auth.psylib.eu;

        ssl_certificate     /etc/letsencrypt/live/auth.psylib.eu/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/auth.psylib.eu/privkey.pem;

        # TLS 1.3 only (HDS)
        ssl_protocols TLSv1.3;
        ssl_ciphers   HIGH:!aNULL:!MD5;
        ssl_prefer_server_ciphers off;

        # HSTS
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;

        # Proxy Keycloak
        location / {
            proxy_pass         http://keycloak;
            proxy_http_version 1.1;
            proxy_set_header   Upgrade           $http_upgrade;
            proxy_set_header   Connection        "upgrade";
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_set_header   X-Forwarded-Host  $host;
            proxy_buffer_size          128k;
            proxy_buffers              4 256k;
            proxy_read_timeout         120s;
        }
    }
}
