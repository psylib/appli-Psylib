<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { background: #0e1330; overflow: hidden; }
  #stage { position: relative; width: 1080px; height: 1080px; }

  /* ---- structure partagée (reprise de library.html) ---- */
  .card { position: relative; width: 1080px; height: 1080px; overflow: hidden; font-family: 'Inter', sans-serif; }
  .blob { position: absolute; border-radius: 50%; will-change: transform; }
  .bgq { position:absolute; top:90px; left:60px; font-family:'Fraunces',serif; font-size:600px; line-height:1; font-weight:700; user-select:none; transform-origin: top left; }
  .content { position: relative; z-index: 2; height: 100%; display: flex; flex-direction: column; padding: 96px 100px; }
  .brand { display: flex; align-items: center; gap: 18px; will-change: transform, opacity; }
  .brand-mark { width: 58px; height: 58px; border-radius: 16px; background: #fff;
    display: flex; align-items: center; justify-content: center; box-shadow: 0 8px 22px rgba(0,0,0,0.16); }
  .brand-logo { width: 42px; height: 42px; display: block; }
  .brand-name { font-size: 34px; font-weight: 700; letter-spacing: -0.5px; }
  .quote-wrap { flex: 1; display: flex; flex-direction: column; justify-content: center; }
  .accent-bar { width: 92px; height: 7px; border-radius: 99px; margin-bottom: 44px; }
  .quote { font-family: 'Fraunces', serif; font-size: 74px; line-height: 1.18; font-weight: 600; letter-spacing: -1px; }
  .qline { will-change: transform, opacity; }
  .footer { display: flex; align-items: center; justify-content: space-between; will-change: transform, opacity; }
  .tagline { font-size: 27px; font-weight: 500; }
  .url { font-size: 28px; font-weight: 700; padding: 14px 28px; border-radius: 99px; }
  .big-mark { font-family:'Fraunces',serif; font-size:170px; line-height:0.6; height:90px; will-change: transform, opacity; }

  /* ---- INDIGO ---- */
  .s-indigo { background: linear-gradient(150deg, #3D52A0 0%, #2c3c7a 48%, #1E1B4B 100%); color:#fff; }
  .s-indigo .bgq { color: rgba(255,255,255,0.06); }
  .s-indigo .b1 { width:520px;height:520px;top:-160px;right:-140px; background:radial-gradient(circle,#0D9488 0%,rgba(13,148,136,0) 70%); opacity:.45; }
  .s-indigo .b2 { width:460px;height:460px;bottom:-150px;left:-130px; background:radial-gradient(circle,#7C3AED 0%,rgba(124,58,237,0) 70%); opacity:.4; }
  .s-indigo .brand-name { color:#fff; } .s-indigo .brand-name span { color:#7B9CDA; }
  .s-indigo .accent-bar { background:linear-gradient(90deg,#0D9488,#7B9CDA); }
  .s-indigo .quote .hl { color:#5fd4c4; }
  .s-indigo .tagline { color:rgba(255,255,255,0.78); }
  .s-indigo .url { background:rgba(255,255,255,0.10); border:1px solid rgba(255,255,255,0.18); color:#fff; }

  /* ---- LIGHT ---- */
  .s-light { background: linear-gradient(160deg, #F8F7FF 0%, #F1F0F9 100%); color:#1E1B4B; }
  .s-light .b1 { width:520px;height:520px;top:-180px;right:-160px; background:radial-gradient(circle,rgba(13,148,136,0.18) 0%,rgba(13,148,136,0) 70%); }
  .s-light .b2 { width:420px;height:420px;bottom:-160px;left:-140px; background:radial-gradient(circle,rgba(124,58,237,0.14) 0%,rgba(124,58,237,0) 70%); }
  .s-light .brand-name { color:#1E1B4B; } .s-light .brand-name span { color:#3D52A0; }
  .s-light .accent-bar { background:linear-gradient(90deg,#0D9488,#7B9CDA); }
  .s-light .quote .hl { color:#0D9488; }
  .s-light .tagline { color:#6b6790; }
  .s-light .url { background:#3D52A0; color:#fff; }

  /* ---- TEAL ---- */
  .s-teal { background: linear-gradient(150deg, #0D9488 0%, #0b6f66 50%, #134e4a 100%); color:#fff; }
  .s-teal .bgq { color:rgba(255,255,255,0.08); }
  .s-teal .b1 { width:500px;height:500px;bottom:-170px;right:-150px; background:radial-gradient(circle,rgba(124,58,237,0.30) 0%,rgba(124,58,237,0) 70%); }
  .s-teal .brand-name { color:#fff; } .s-teal .brand-name span { color:#a7f3e8; }
  .s-teal .accent-bar { background:#fde68a; }
  .s-teal .quote .hl { color:#fde68a; }
  .s-teal .tagline { color:rgba(255,255,255,0.82); }
  .s-teal .url { background:rgba(255,255,255,0.12); border:1px solid rgba(255,255,255,0.22); color:#fff; }

  /* ---- VIOLET (centré) ---- */
  .s-violet { background: linear-gradient(155deg, #7C3AED 0%, #5b21b6 48%, #3D52A0 100%); color:#fff; text-align:center; }
  .s-violet .b1 { width:520px;height:520px;top:-180px;left:-150px; background:radial-gradient(circle,rgba(13,148,136,0.30) 0%,rgba(13,148,136,0) 70%); }
  .s-violet .b2 { width:440px;height:440px;bottom:-160px;right:-150px; background:radial-gradient(circle,rgba(123,156,218,0.30) 0%,rgba(123,156,218,0) 70%); }
  .s-violet .content { align-items:center; }
  .s-violet .brand { justify-content:center; }
  .s-violet .brand-name { color:#fff; } .s-violet .brand-name span { color:#c4b5fd; }
  .s-violet .big-mark { color:#5fd4c4; }
  .s-violet .quote-wrap { align-items:center; }
  .s-violet .accent-bar { background:linear-gradient(90deg,#5fd4c4,#c4b5fd); margin:40px auto 0; }
  .s-violet .quote .hl { color:#5fd4c4; }
  .s-violet .footer { justify-content:center; flex-direction:column; gap:22px; }
  .s-violet .tagline { color:rgba(255,255,255,0.82); }
  .s-violet .url { background:rgba(255,255,255,0.12); border:1px solid rgba(255,255,255,0.22); color:#fff; }
</style>
</head>
<body>
<div id="stage"></div>

<script>
  const clamp01 = (x) => Math.max(0, Math.min(1, x));
  const seg = (t, start, dur) => clamp01((t - start) / dur);
  const easeOut = (x) => 1 - Math.pow(1 - x, 3);
  const hlReplace = (s) => s.replace(/\*([^*]+)\*/g, '<span class="hl">$1</span>');

  window.TOTAL = 5.0; // durée de boucle (s)
  let E = null;       // refs DOM de la carte courante

  // Construit le DOM d'une carte à partir de ses données
  window.buildCard = function (card) {
    const blobs = card.blobs === 1
      ? '<div class="blob b1"></div>'
      : '<div class="blob b1"></div><div class="blob b2"></div>';
    const bgq = card.mark === 'bgq' ? '<div class="bgq mark">&ldquo;</div>' : '';
    const bigMark = card.mark === 'bigmark' ? '<div class="big-mark mark">&ldquo;</div>' : '';
    const linesHtml = card.lines.map((l) => `<div class="qline">${hlReplace(l)}</div>`).join('');
    const bar = '<div class="accent-bar"></div>';

    const quoteInner = card.bar === 'bottom'
      ? `${bigMark}<div class="quote">${linesHtml}</div>${bar}`
      : `${bar}<div class="quote">${linesHtml}</div>`;

    const html =
      `<div class="card s-${card.style}">` +
        bgq + blobs +
        '<div class="content">' +
          '<div class="brand"><div class="brand-mark"><img class="brand-logo" src="logo-mark.png" alt=""></div><div class="brand-name">Psy<span>Lib</span></div></div>' +
          `<div class="quote-wrap">${quoteInner}</div>` +
          `<div class="footer"><div class="tagline">${card.tagline}</div><div class="url">psylib.eu</div></div>` +
        '</div>' +
      '</div>';

    const stage = document.getElementById('stage');
    stage.innerHTML = html;
    E = {
      mark:   stage.querySelector('.mark'),
      brand:  stage.querySelector('.brand'),
      bar:    stage.querySelector('.accent-bar'),
      hl:     stage.querySelector('.hl'),
      footer: stage.querySelector('.footer'),
      b1:     stage.querySelector('.b1'),
      b2:     stage.querySelector('.b2'),
      lines:  Array.from(stage.querySelectorAll('.qline')),
    };
    window.render(0);
  };

  // Applique l'état de l'animation à l'instant t (secondes)
  window.render = function (t) {
    if (!E) return;
    // Blobs : flottement continu (période = TOTAL → boucle propre)
    const ph = (t / window.TOTAL) * Math.PI * 2;
    if (E.b1) E.b1.style.transform = `translate(${Math.sin(ph) * 24}px, ${Math.cos(ph) * 18}px) scale(${1 + 0.05 * Math.sin(ph)})`;
    if (E.b2) E.b2.style.transform = `translate(${Math.cos(ph) * -22}px, ${Math.sin(ph) * 16}px) scale(${1 + 0.05 * Math.cos(ph)})`;

    // Guillemet (fond ou centré)
    if (E.mark) {
      const p = easeOut(seg(t, 0.15, 0.7));
      E.mark.style.opacity = p;
      E.mark.style.transform = `scale(${0.85 + 0.15 * p})`;
    }
    // Marque (logo + nom) : slide depuis la gauche
    let p = easeOut(seg(t, 0.30, 0.50));
    E.brand.style.opacity = p;
    E.brand.style.transform = `translateX(${(1 - p) * -28}px)`;

    // Barre d'accent : déploiement
    p = easeOut(seg(t, 0.70, 0.45));
    E.bar.style.width = (92 * p) + 'px';

    // Citation : apparition ligne par ligne (stagger)
    E.lines.forEach((ln, i) => {
      const pp = easeOut(seg(t, 0.95 + i * 0.16, 0.55));
      ln.style.opacity = pp;
      ln.style.transform = `translateY(${(1 - pp) * 26}px)`;
    });

    // Highlight : halo pulsé une fois révélé
    if (E.hl) {
      const reveal = clamp01(seg(t, 1.9, 0.4));
      const glow = 0.5 + 0.5 * Math.sin((t - 1.9) * 2.0);
      const col = getComputedStyle(E.hl).color;
      E.hl.style.textShadow = `0 0 ${(10 + 16 * glow) * reveal}px ${col.replace('rgb', 'rgba').replace(')', ', ' + (0.55 * reveal) + ')')}`;
    }

    // Footer
    p = easeOut(seg(t, 2.25, 0.55));
    E.footer.style.opacity = p;
    E.footer.style.transform = `translateY(${(1 - p) * 22}px)`;
  };
</script>
</body>
</html>
