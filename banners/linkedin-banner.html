<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <title>LinkedIn Banner — Psys Liberaux France</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');

    .banner {
      width: 1536px;
      height: 768px;
      background: linear-gradient(145deg, #0F172A 0%, #1E1B4B 50%, #312E81 100%);
      font-family: 'Inter', sans-serif;
      position: relative;
      overflow: hidden;
      display: flex;
      align-items: center;
      padding: 0 90px;
    }

    /* Grid pattern background */
    .grid-bg {
      position: absolute;
      inset: 0;
      background-image:
        linear-gradient(rgba(255,255,255,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.03) 1px, transparent 1px);
      background-size: 60px 60px;
    }

    /* Glow orbs */
    .orb-1 {
      position: absolute;
      top: -100px;
      right: 200px;
      width: 500px;
      height: 500px;
      background: radial-gradient(circle, rgba(61, 82, 160, 0.25) 0%, transparent 60%);
      border-radius: 50%;
    }

    .orb-2 {
      position: absolute;
      bottom: -80px;
      left: 300px;
      width: 400px;
      height: 400px;
      background: radial-gradient(circle, rgba(13, 148, 136, 0.15) 0%, transparent 60%);
      border-radius: 50%;
    }

    .content {
      position: relative;
      z-index: 2;
      flex: 1;
      max-width: 800px;
    }

    .logo {
      font-size: 20px;
      font-weight: 700;
      color: #7B9CDA;
      letter-spacing: 2px;
      text-transform: uppercase;
      margin-bottom: 32px;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .logo-dot {
      width: 10px;
      height: 10px;
      background: #0D9488;
      border-radius: 50%;
    }

    h1 {
      font-size: 72px;
      font-weight: 800;
      color: #FFFFFF;
      line-height: 1.08;
      margin-bottom: 24px;
      letter-spacing: -2px;
    }

    h1 .line2 {
      color: #7B9CDA;
    }

    .subtitle {
      font-size: 24px;
      font-weight: 400;
      color: rgba(255, 255, 255, 0.6);
      line-height: 1.5;
      max-width: 620px;
      margin-bottom: 44px;
    }

    .stats {
      display: flex;
      gap: 48px;
    }

    .stat {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .stat-value {
      font-size: 32px;
      font-weight: 800;
      color: #FFFFFF;
    }

    .stat-value .highlight { color: #5EEAD4; }

    .stat-label {
      font-size: 15px;
      font-weight: 500;
      color: rgba(255, 255, 255, 0.4);
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    /* Right side: network visualization */
    .network {
      position: absolute;
      right: 60px;
      top: 50%;
      transform: translateY(-50%);
      width: 500px;
      height: 500px;
      z-index: 2;
    }

    .node {
      position: absolute;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 24px;
    }

    .node-lg {
      width: 90px;
      height: 90px;
      background: rgba(61, 82, 160, 0.3);
      border: 2px solid rgba(123, 156, 218, 0.4);
    }

    .node-md {
      width: 70px;
      height: 70px;
      background: rgba(13, 148, 136, 0.2);
      border: 2px solid rgba(94, 234, 212, 0.3);
    }

    .node-sm {
      width: 54px;
      height: 54px;
      background: rgba(124, 58, 237, 0.2);
      border: 2px solid rgba(167, 139, 250, 0.3);
    }

    /* Position each node */
    .n1 { top: 50%; left: 50%; transform: translate(-50%, -50%); width: 100px; height: 100px; font-size: 32px; background: rgba(61, 82, 160, 0.4); border: 2px solid rgba(123, 156, 218, 0.6); }
    .n2 { top: 10%; left: 30%; }
    .n3 { top: 15%; right: 15%; }
    .n4 { top: 45%; left: 5%; }
    .n5 { top: 45%; right: 2%; }
    .n6 { bottom: 15%; left: 20%; }
    .n7 { bottom: 10%; right: 20%; }
    .n8 { top: 75%; left: 50%; transform: translateX(-50%); }

    /* Connection lines */
    .connections {
      position: absolute;
      inset: 0;
    }

    .connections svg {
      width: 100%;
      height: 100%;
    }

    .connections line {
      stroke: rgba(123, 156, 218, 0.15);
      stroke-width: 1.5;
    }

    /* Divider */
    .divider {
      position: absolute;
      left: 55%;
      top: 15%;
      bottom: 15%;
      width: 1px;
      background: linear-gradient(to bottom, transparent, rgba(255,255,255,0.08), transparent);
    }

    /* Bottom accent */
    .bottom-accent {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      height: 4px;
      background: linear-gradient(90deg, #0D9488, #3D52A0, #7C3AED);
    }

    .url {
      position: absolute;
      bottom: 28px;
      left: 90px;
      font-size: 18px;
      font-weight: 600;
      color: rgba(255, 255, 255, 0.3);
      z-index: 2;
      letter-spacing: 0.5px;
    }
  </style>
</head>
<body>
  <div class="banner">
    <div class="grid-bg"></div>
    <div class="orb-1"></div>
    <div class="orb-2"></div>
    <div class="divider"></div>

    <div class="content">
      <div class="logo">
        <div class="logo-dot"></div>
        PsyLib Community
      </div>
      <h1>Psys Lib&eacute;raux<br/><span class="line2">France</span></h1>
      <p class="subtitle">
        Rejoignez le r&eacute;seau professionnel des psychologues lib&eacute;raux.
        Entraide, ressources et d&eacute;veloppement.
      </p>
      <div class="stats">
        <div class="stat">
          <div class="stat-value"><span class="highlight">30k</span>+</div>
          <div class="stat-label">Psys en France</div>
        </div>
        <div class="stat">
          <div class="stat-value">100<span class="highlight">%</span></div>
          <div class="stat-label">Gratuit</div>
        </div>
        <div class="stat">
          <div class="stat-value"><span class="highlight">Pro</span></div>
          <div class="stat-label">Entre pairs</div>
        </div>
      </div>
    </div>

    <!-- Network visualization -->
    <div class="network">
      <div class="connections">
        <svg viewBox="0 0 500 500">
          <line x1="250" y1="250" x2="150" y2="60" />
          <line x1="250" y1="250" x2="380" y2="85" />
          <line x1="250" y1="250" x2="40" y2="240" />
          <line x1="250" y1="250" x2="460" y2="240" />
          <line x1="250" y1="250" x2="110" y2="400" />
          <line x1="250" y1="250" x2="390" y2="400" />
          <line x1="250" y1="250" x2="250" y2="410" />
          <line x1="150" y1="60" x2="380" y2="85" />
          <line x1="40" y1="240" x2="110" y2="400" />
          <line x1="460" y1="240" x2="390" y2="400" />
          <line x1="110" y1="400" x2="250" y2="410" />
          <line x1="390" y1="400" x2="250" y2="410" />
        </svg>
      </div>
      <div class="node node-lg n1">&#129504;</div>
      <div class="node node-lg n2">&#128105;&#8205;&#9877;&#65039;</div>
      <div class="node node-md n3">&#128104;&#8205;&#9877;&#65039;</div>
      <div class="node node-md n4">&#128105;&#8205;&#128187;</div>
      <div class="node node-sm n5">&#129504;</div>
      <div class="node node-sm n6">&#128105;&#8205;&#9877;&#65039;</div>
      <div class="node node-md n7">&#128104;&#8205;&#128187;</div>
      <div class="node node-sm n8">&#129504;</div>
    </div>

    <div class="bottom-accent"></div>
    <div class="url">psylib.eu</div>
  </div>
</body>
</html>
