name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  typecheck:
    name: TypeScript Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v3
        with:
          version: latest

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - run: pnpm install --frozen-lockfile

      - name: TypeCheck API
        run: cd apps/api && pnpm prisma generate && npx tsc --noEmit

      - name: TypeCheck Web
        run: cd apps/web && npx tsc --noEmit

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v3
        with:
          version: latest

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - run: pnpm install --frozen-lockfile

      - name: Lint API (skipped — no ESLint config yet)
        run: echo "Lint API skipped — no ESLint config file in apps/api"

      - name: Lint Web (skipped — no ESLint config yet)
        run: echo "Lint Web skipped — no ESLint config file in apps/web"

  test:
    name: Tests
    runs-on: ubuntu-latest
    needs: [typecheck]
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v3
        with:
          version: latest

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: cd apps/api && pnpm prisma generate

      - name: Run API tests
        run: pnpm --filter api test

      - name: Run Web tests (skipped — no test script yet)
        run: echo "Web tests skipped — no test script in apps/web"
