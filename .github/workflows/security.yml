name: Security

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  schedule:
    # Scan hebdomadaire (lundi 6h UTC) — capte les nouvelles CVE sur le code figé
    - cron: '0 6 * * 1'

# Annule les runs obsolètes sur une même ref
concurrency:
  group: security-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ─── Détection de secrets commités (BLOQUANT) ───────────────────────────────
  gitleaks:
    name: Secret scanning (gitleaks)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # Historique complet requis pour scanner les commits sur les PR
          fetch-depth: 0

      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ─── SAST CodeQL (JS/TS) ────────────────────────────────────────────────────
  codeql:
    name: CodeQL (javascript-typescript)
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: javascript-typescript
          queries: security-extended

      - name: Autobuild
        uses: github/codeql-action/autobuild@v3

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: '/language:javascript-typescript'

  # ─── Audit des dépendances (informatif — vulns transitives connues) ─────────
  dependency-audit:
    name: pnpm audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v3
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - run: pnpm install --frozen-lockfile

      # Non bloquant : des vulns transitives connues existent (multer, xlsx).
      # Le rapport reste visible dans les logs ; le suivi se fait via Dependabot.
      - name: Audit (high+)
        run: pnpm audit --audit-level high || true

  # ─── Revue des dépendances ajoutées sur une PR (bloque les licences/CVE) ────
  dependency-review:
    name: Dependency review (PR)
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v4

      - name: Dependency Review
        uses: actions/dependency-review-action@v4
        with:
          fail-on-severity: high
          comment-summary-in-pr: on-failure
