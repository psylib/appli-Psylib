# EAS Workflows — Production CI/CD Pipeline
# Triggered on:
#   - Push to main: preview build
#   - Tag v*-mobile: production build + store submit

name: PsyLib Mobile CI/CD

on:
  push:
    branches: [main]
    paths:
      - 'apps/mobile/**'
  release:
    tags:
      - 'v*-mobile'

jobs:
  # Step 1: Type check + lint + test
  quality:
    name: Quality checks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: TypeScript check
        run: pnpm --filter @psyscale/mobile typecheck

      - name: Lint
        run: pnpm --filter @psyscale/mobile lint

      - name: Unit tests
        run: pnpm --filter @psyscale/mobile test -- --ci --coverage

  # Step 2: Build preview (on push to main)
  build-preview:
    name: Build preview
    needs: quality
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Build iOS preview
        working-directory: apps/mobile
        run: eas build --platform ios --profile preview --non-interactive

      - name: Build Android preview
        working-directory: apps/mobile
        run: eas build --platform android --profile preview --non-interactive

  # Step 3: Production build + submit (on tag)
  build-production:
    name: Build & submit production
    needs: quality
    if: startsWith(github.ref, 'refs/tags/v') && contains(github.ref, '-mobile')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Build iOS production
        working-directory: apps/mobile
        run: eas build --platform ios --profile production --non-interactive

      - name: Build Android production
        working-directory: apps/mobile
        run: eas build --platform android --profile production --non-interactive

      - name: Submit to App Store
        working-directory: apps/mobile
        run: eas submit --platform ios --latest --non-interactive

      - name: Submit to Play Store
        working-directory: apps/mobile
        run: eas submit --platform android --latest --non-interactive
